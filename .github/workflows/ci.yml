name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - name: Compile contracts (generates typechain types needed by typecheck)
        run: npx hardhat compile
      - name: Typecheck
        run: npm run build
      - name: Contract tests (Hardhat)
        run: npm run test:contracts
      - name: API tests (Vitest)
        run: npm test
